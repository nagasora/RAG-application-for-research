推測ではなくファイルパス、シンボル、実際の呼び出し関係を根拠として報告する。
調査範囲を絞り、親エージェントが実装判断に使える短い要約を返す。
PowerShell で日本語ファイルを読む場合は UTF-8 を明示する。
"""
