# Render Blueprint for PaperPilot's low-cost persistent API.
#
# PostgreSQL lives in Neon and original files live in Cloudflare R2.  Values
# marked sync:false are supplied in Render's Environment UI after deployment.
services:
  - type: web
    runtime: docker
    name: paperpilot-api
    region: singapore
    plan: free
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .
    # Keep this explicit: Render preserves an existing Docker command when the
    # field is omitted from a later Blueprint sync.
    dockerCommand: /app/start.sh
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_MODE
        value: oidc
      - key: OIDC_ISSUER
        sync: false
      - key: OIDC_AUDIENCE
        sync: false
      - key: OIDC_JWKS_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-nano
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: RAG_REQUEST_DEADLINE_SECONDS
        value: "25"
      - key: INGESTION_MODE
        # Free Render instances can take longer than the browser/proxy request
        # window for PDF extraction.  Return a durable job and process locally
        # after the upload response; the client polls /api/jobs/{job_id}.
        value: background
      - key: ENABLE_OCR
        value: "false"
      - key: PAPER_ORIGINAL_STORAGE_DIR
        value: /app/data/originals
      - key: PAPER_ASSET_STORAGE_DIR
        value: /app/data/assets
      - key: PAPER_STORAGE_BACKEND
        value: r2
      - key: R2_ACCOUNT_ID
        value: 16ca5f18c0e931a0ed51e91313211415
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: paperpilot-data
      - key: R2_PREFIX
        value: paperpilot
