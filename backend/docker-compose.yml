services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: paperpilot
      POSTGRES_USER: paperpilot
      POSTGRES_PASSWORD: paperpilot
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - paperpilot-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperpilot -d paperpilot"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend_internal, host_access]
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    networks: [backend_internal, host_access]
    profiles: [workers]
  bootstrap:
    build: .
    command: ["sh", "-c", "python -m alembic upgrade head && python -m app.bootstrap_worker_role"]
    environment:
      DATABASE_URL: ${OWNER_DATABASE_URL:-postgresql+psycopg://paperpilot:paperpilot@postgres:5432/paperpilot}
      OWNER_DATABASE_URL: ${OWNER_DATABASE_URL:-postgresql+psycopg://paperpilot:paperpilot@postgres:5432/paperpilot}
      WORKER_DB_PASSWORD: ${WORKER_DB_PASSWORD:-paperpilot-worker-dev-password}
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1770,uid=10001,gid=10001,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    mem_limit: 512m
    cpus: "0.5"
    networks: [backend_internal]
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: ${API_DATABASE_URL:-postgresql+psycopg://paperpilot:paperpilot@postgres:5432/paperpilot}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-nano}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-local-hash-v1}
      RAG_REQUEST_DEADLINE_SECONDS: ${RAG_REQUEST_DEADLINE_SECONDS:-25}
      AUTH_MODE: ${AUTH_MODE:-dev}
      DEV_AUTH_USER: ${DEV_AUTH_USER:-local-developer}
      DEV_AUTH_TOKEN: ${DEV_AUTH_TOKEN:-replace-with-a-long-random-local-secret}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      # A personal installation is synchronous by default: no queue, cloud
      # service, or extra worker process is required.  Set this to celery and
      # start `docker compose --profile workers up -d` for asynchronous jobs.
      INGESTION_MODE: ${INGESTION_MODE:-inline}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PAPER_STORAGE_BACKEND: ${PAPER_STORAGE_BACKEND:-local}
      PAPER_ORIGINAL_STORAGE_DIR: /app/data/originals
      PAPER_ASSET_STORAGE_DIR: /app/data/assets
    ports:
      - "127.0.0.1:${PAPERPILOT_API_PORT:-8000}:8000"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./data/originals:/app/data/originals:rw
      - ./data/assets:/app/data/assets:rw
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1770,uid=10001,gid=10001,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    mem_limit: 1g
    cpus: "1.0"
    networks: [backend_internal, host_access]
  worker:
    build: .
    command: celery -A app.celery_app:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ${WORKER_DATABASE_URL:-postgresql+psycopg://paperpilot_worker:${WORKER_DB_PASSWORD:-paperpilot-worker-dev-password}@postgres:5432/paperpilot}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PAPER_ORIGINAL_STORAGE_DIR: /app/data/originals
      PAPER_ASSET_STORAGE_DIR: /app/data/assets
      INGESTION_MAX_ATTEMPTS: ${INGESTION_MAX_ATTEMPTS:-3}
      INGESTION_LEASE_SECONDS: ${INGESTION_LEASE_SECONDS:-300}
      INGESTION_HEARTBEAT_SECONDS: ${INGESTION_HEARTBEAT_SECONDS:-60}
      INGESTION_REAPER_INTERVAL_SECONDS: ${INGESTION_REAPER_INTERVAL_SECONDS:-60}
      INGESTION_MAX_PAGES: ${INGESTION_MAX_PAGES:-300}
      INGESTION_MAX_SECONDS: ${INGESTION_MAX_SECONDS:-300}
      INGESTION_MAX_CPU_SECONDS: ${INGESTION_MAX_CPU_SECONDS:-240}
      INGESTION_MAX_INPUT_BYTES: ${INGESTION_MAX_INPUT_BYTES:-26214400}
      INGESTION_MAX_ASSETS: ${INGESTION_MAX_ASSETS:-100}
      INGESTION_MAX_ASSET_BYTES: ${INGESTION_MAX_ASSET_BYTES:-20971520}
      ENABLE_OCR: ${ENABLE_OCR:-false}
      OCR_LANGUAGES: ${OCR_LANGUAGES:-jpn+eng}
      OCR_DENSITY_THRESHOLD: ${OCR_DENSITY_THRESHOLD:-100}
      OCR_TIMEOUT_SECONDS: ${OCR_TIMEOUT_SECONDS:-20}
      OCR_FAILURE_POLICY: ${OCR_FAILURE_POLICY:-native}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-300}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-330}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-local-hash-v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./data/originals:/app/data/originals:ro
      - ./data/assets:/app/data/assets:rw
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1770,uid=10001,gid=10001,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g
    cpus: "2.0"
    networks: [backend_internal]
    profiles: [workers]
  embedding-worker:
    build: .
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info", "-Q", "${EMBEDDING_TASK_QUEUE:-embedding}"]
    environment:
      DATABASE_URL: ${WORKER_DATABASE_URL:-postgresql+psycopg://paperpilot_worker:${WORKER_DB_PASSWORD:-paperpilot-worker-dev-password}@postgres:5432/paperpilot}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-local-hash-v1}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      EMBEDDING_TASK_QUEUE: ${EMBEDDING_TASK_QUEUE:-embedding}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-64}
      EMBEDDING_MAX_ATTEMPTS: ${EMBEDDING_MAX_ATTEMPTS:-3}
      EMBEDDING_LEASE_SECONDS: ${EMBEDDING_LEASE_SECONDS:-300}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-15}
      EMBEDDING_TASK_SOFT_TIME_LIMIT: ${EMBEDDING_TASK_SOFT_TIME_LIMIT:-180}
      EMBEDDING_TASK_TIME_LIMIT: ${EMBEDDING_TASK_TIME_LIMIT:-210}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1770,uid=10001,gid=10001,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    mem_limit: 1g
    cpus: "1.0"
    networks: [backend_internal, host_access]
    profiles: [workers]
  beat:
    build: .
    command: celery -A app.celery_app:celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      DATABASE_URL: ${WORKER_DATABASE_URL:-postgresql+psycopg://paperpilot_worker:${WORKER_DB_PASSWORD:-paperpilot-worker-dev-password}@postgres:5432/paperpilot}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      INGESTION_MAX_ATTEMPTS: ${INGESTION_MAX_ATTEMPTS:-3}
      INGESTION_LEASE_SECONDS: ${INGESTION_LEASE_SECONDS:-300}
      INGESTION_REAPER_INTERVAL_SECONDS: ${INGESTION_REAPER_INTERVAL_SECONDS:-60}
      EMBEDDING_TASK_QUEUE: ${EMBEDDING_TASK_QUEUE:-embedding}
      EMBEDDING_MAX_ATTEMPTS: ${EMBEDDING_MAX_ATTEMPTS:-3}
      EMBEDDING_LEASE_SECONDS: ${EMBEDDING_LEASE_SECONDS:-300}
      EMBEDDING_DISPATCH_INTERVAL_SECONDS: ${EMBEDDING_DISPATCH_INTERVAL_SECONDS:-10}
      EMBEDDING_DISPATCH_BATCH_SIZE: ${EMBEDDING_DISPATCH_BATCH_SIZE:-100}
    depends_on:
      redis:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1770,uid=10001,gid=10001,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    mem_limit: 512m
    cpus: "0.5"
    networks: [backend_internal]
    profiles: [workers]

volumes:
  paperpilot-postgres:

networks:
  backend_internal:
    internal: true
  host_access:
